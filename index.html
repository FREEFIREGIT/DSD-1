<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#00ffcc">

<h1>🇩🇪 Deutsch Game</h1>

<style>
body {
  margin: 0;
  font-family: Arial;
  text-align: center;
  background: linear-gradient(135deg, #141e30, #243b55);
  color: white;
}

.container {
  padding: 15px;
  max-width: 500px;
  margin: auto;
}

button {
  padding: 15px;
  width: 90%;
  margin: 8px;
  border: none;
  border-radius: 15px;
  background: #00ffcc;
  font-size: 16px;
}

button:hover {
  background: #00ccaa;
  transform: scale(1.03);
}

.card {
  background: rgba(255,255,255,0.1);
  padding: 15px;
  border-radius: 15px;
  margin-top: 20px;
}

#topList {
  list-style: none;
  padding: 0;
}

#topList li {
  background: rgba(255,255,255,0.1);
  margin: 8px;
  padding: 10px;
  border-radius: 10px;
}
</style>
</head>

<body>

<div class="container">

<h1>🇩🇪 Deutsch Game</h1>

<a href="game.html">
  <button>🎮 Играть и проверить себя</button>
</a>

<div class="card">
  <h2>👤 Профиль</h2>
  <p id="profile">Гость</p>
</div>

<div class="card">
  <h2>🏆 Топ игроков</h2>
  <ul id="topList"></ul>
</div>

</div>
<button onclick="goAdmin()">🧑‍💻 Админ панель</button>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { 
  getFirestore, 
  collection, 
  getDocs, 
  query, 
  orderBy, 
  limit 
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBNLGv37SNJ9B6Wg8L_tzvACs74FRWtlbQ",
  authDomain: "dsd-1-bd1d3.firebaseapp.com",
  projectId: "dsd-1-bd1d3",
  storageBucket: "dsd-1-bd1d3.firebasestorage.app",
  messagingSenderId: "767600115022",
  appId: "1:767600115022:web:dd617064aec2c7c687b21f"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// 👤 профиль
let name = localStorage.getItem("playerName") || "Гость";
document.getElementById("profile").innerText = name;

// 🏆 загрузка топа
async function loadTop() {
  try {
    const q = query(
      collection(db, "leaderboard"),
      orderBy("score", "desc"),
      limit(5)
    );

    const snap = await getDocs(q);

    let list = document.getElementById("topList");
    list.innerHTML = "";

    let i = 0;

    snap.forEach(doc => {
      let d = doc.data();
      i++;

      let medal = i === 1 ? "🥇" :
                   i === 2 ? "🥈" :
                   i === 3 ? "🥉" : "🎮";

      let li = document.createElement("li");
      li.innerText = `${medal} ${d.name} - ⭐ ${d.score}`;
      list.appendChild(li);
    });

  } catch (err) {
    console.log("Ошибка загрузки топа:", err);
  }
}

// 🔄 автообновление
loadTop();
setInterval(loadTop, 5000);
</script>
  <script>
function goAdmin() {
  window.location.href = "admin.html";
}
    // 🔥 FIREBASE (ТВОЙ CONFIG)
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBNLGv37SNJ9B6Wg8L_tzvACs74FRWtlbQ",
  authDomain: "dsd-1-bd1d3.firebaseapp.com",
  projectId: "dsd-1-bd1d3",
  storageBucket: "dsd-1-bd1d3.firebasestorage.app",
  messagingSenderId: "767600115022",
  appId: "1:767600115022:web:dd617064aec2c7c687b21f"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// 👇 ВСТАВЬ СВОЙ EMAIL
const ADMIN_EMAIL = "samirdv888@gmail.com";

// =========================
// 🔐 УЛЬТРА СЕКРЕТ ЛОГИКА
// =========================

let clicks = 0;
let code = "";

// 🎯 КЛИКИ ПО ЗАГОЛОВКУ
document.querySelector("h1").addEventListener("click", () => {
  clicks++;

  if (clicks >= 5) unlock();
  setTimeout(() => clicks = 0, 2000);
});

// ⌨️ СЕКРЕТНЫЙ КОД
document.addEventListener("keydown", e => {
  code += e.key.toLowerCase();

  if (code.includes("admin")) unlock();

  if (code.length > 10) code = "";
});

// 🔓 РАЗБЛОКИРОВКА
async function unlock() {
  showEffect("🔐 ACCESS CHECK...");

  const provider = new GoogleAuthProvider();
  const res = await signInWithPopup(auth, provider);

  if (res.user.email === ADMIN_EMAIL) {
    showEffect("✅ ACCESS GRANTED");
    setTimeout(() => {
      window.location.href = "admin.html";
    }, 1200);
  } else {
    showEffect("❌ ACCESS DENIED");
  }
}

// 🎬 ЭФФЕКТ КАК В ИГРЕ
function showEffect(text) {
  let div = document.createElement("div");

  div.style.position = "fixed";
  div.style.top = "0";
  div.style.left = "0";
  div.style.width = "100%";
  div.style.height = "100%";
  div.style.background = "black";
  div.style.color = "#00ffcc";
  div.style.display = "flex";
  div.style.alignItems = "center";
  div.style.justifyContent = "center";
  div.style.fontSize = "28px";
  div.style.zIndex = "9999";
  div.innerText = text;

  document.body.appendChild(div);

  setTimeout(() => div.remove(), 1500);

  // 🔊 звук
  let audio = new Audio("https://www.soundjay.com/buttons/sounds/button-3.mp3");
  audio.play();
}
</script>
</body>
</html>
