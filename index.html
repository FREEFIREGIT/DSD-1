<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deutsch Game</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  text-align: center;
  background: linear-gradient(135deg, #141e30, #243b55);
  color: white;
}

.container {
  padding: 15px;
  max-width: 500px;
  margin: auto;
}

button {
  padding: 15px;
  width: 90%;
  margin: 8px;
  border: none;
  border-radius: 15px;
  background: #00ffcc;
  font-size: 16px;
}

.card {
  background: rgba(255,255,255,0.1);
  padding: 15px;
  border-radius: 15px;
  margin-top: 20px;
}
</style>
</head>

<body>

<div class="container">

<h1>🎮 Game</h1>

<h2 id="question"></h2>
<div id="answers"></div>

<p>⭐ Score: <span id="score">0</span></p>
<p>🔥 XP: <span id="xp">0</span></p>
<p>🏆 Level: <span id="level">A1</span></p>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { 
  getFirestore, doc, getDoc, setDoc, updateDoc 
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// 🔥 FIREBASE
const firebaseConfig = {
  apiKey: "AIzaSyBNLGv37SNJ9B6Wg8L_tzvACs74FRWtlbQ",
  authDomain: "dsd-1-bd1d3.firebaseapp.com",
  projectId: "dsd-1-bd1d3",
  storageBucket: "dsd-1-bd1d3.firebasestorage.app",
  messagingSenderId: "767600115022",
  appId: "1:767600115022:web:dd617064aec2c7c687b21f"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// 👤 игрок
let name = localStorage.getItem("playerName");

if (!name) {
  name = prompt("Введите имя:");
  localStorage.setItem("playerName", name);
}

let playerRef = doc(db, "leaderboard", name);

let playerData = {
  score: 0,
  xp: 0,
  level: "A1"
};

// =====================
// 📥 загрузка игрока
// =====================
async function loadPlayer() {
  let snap = await getDoc(playerRef);

  if (snap.exists()) {
    playerData = snap.data();
  } else {
    await setDoc(playerRef, playerData);
  }

  updateUI();
}

function updateUI() {
  document.getElementById("score").innerText = playerData.score;
  document.getElementById("xp").innerText = playerData.xp;
  document.getElementById("level").innerText = playerData.level;
}

// =====================
// 🧠 ИИ вопросы
// =====================
const words = [
  {ru:"вода", de:"Wasser"},
  {ru:"хлеб", de:"Brot"},
  {ru:"яблоко", de:"Apfel"},
  {ru:"молоко", de:"Milch"},
  {ru:"дом", de:"Haus"},
  {ru:"машина", de:"Auto"}
];

let current = {};

function generateQ() {
  let w = words[Math.floor(Math.random() * words.length)];

  let options = [w.de];
  while (options.length < 3) {
    let r = words[Math.floor(Math.random() * words.length)].de;
    if (!options.includes(r)) options.push(r);
  }

  options.sort(() => Math.random() - 0.5);

  current = {
    q: w.ru,
    a: w.de,
    options
  };

  document.getElementById("question").innerText = current.q;

  let box = document.getElementById("answers");
  box.innerHTML = "";

  current.options.forEach(o => {
    let b = document.createElement("button");
    b.innerText = o;
    b.onclick = check;
    box.appendChild(b);
  });
}

async function check(e) {
  let ans = e.target.innerText;

  if (ans === current.a) {
    playerData.score += 1;
    playerData.xp += 10;
  }

  // уровень
  if (playerData.xp >= 200) playerData.level = "B2";
  else if (playerData.xp >= 100) playerData.level = "B1";
  else if (playerData.xp >= 50) playerData.level = "A2";
  else playerData.level = "A1";

  await updateDoc(playerRef, playerData);

  updateUI();
  generateQ();
}

// старт
await loadPlayer();
generateQ();

</script>

</body>
</html>
