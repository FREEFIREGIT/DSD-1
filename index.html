<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Deutsch Kurs</title>

<style>
  #topList {
  list-style: none;
  padding: 0;
}

#topList li {
  background: rgba(255,255,255,0.1);
  margin: 10px auto;
  padding: 10px;
  border-radius: 10px;
  width: 200px;
}
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
  color: white;
  text-align: center;
}

header {
  padding: 50px 20px;
}

h1 {
  font-size: 40px;
}

p {
  font-size: 18px;
  opacity: 0.8;
}

.btn {
  display: inline-block;
  padding: 15px 30px;
  margin-top: 20px;
  background: #00ffcc;
  color: black;
  text-decoration: none;
  border-radius: 10px;
  transition: 0.3s;
}

.btn:hover {
  background: #00ccaa;
}

.section {
  padding: 50px 20px;
}

.card {
  background: rgba(255,255,255,0.1);
  margin: 15px;
  padding: 20px;
  border-radius: 15px;
  display: inline-block;
  width: 250px;
}

footer {
  padding: 40px 20px;
}

.game-btn {
  background: orange;
  color: black;
  font-weight: bold;
}
</style>

</head>

<body>

<header>
  <h1>🇩🇪 Deutsch Kurs</h1>
  <p>Выучи немецкий легко и быстро</p>
  <a href="#" class="btn">Записаться</a>
</header>

<div class="section">
  <h2>📚 Что ты получишь</h2>

  <div class="card">Грамматика</div>
  <div class="card">Слова</div>
  <div class="card">Разговор</div>
</div>

<div class="section">
  <h2>🎓 Уровни</h2>

  <div class="card">A1 — Начальный</div>
  <div class="card">A2 — Средний</div>
  <div class="card">B1 — Уверенный</div>
</div>
  
<h2>🏆 Топ игроков</h2>
<ul id="topList"></ul>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, getDocs, query, orderBy, limit }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBNLGv37SNJ9B6Wg8L_tzvACs74FRWtlbQ",
  authDomain: "dsd-1-bd1d3.firebaseapp.com",
  projectId: "dsd-1-bd1d3",
  storageBucket: "dsd-1-bd1d3.firebasestorage.app",
  messagingSenderId: "767600115022",
  appId: "1:767600115022:web:dd617064aec2c7c687b21f"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

async function loadTop() {
  const q = query(
    collection(db, "leaderboard"),
    orderBy("score", "desc"),
    limit(5)
  );

  const snapshot = await getDocs(q);

  let list = document.getElementById("topList");
  list.innerHTML = "";

  snapshot.forEach(doc => {
    let data = doc.data();
    let li = document.createElement("li");
    li.innerText = data.name + " — " + data.score;
    list.appendChild(li);
  });
}

loadTop();
</script>
  
<footer>
  <h2>🎮 Хочешь проверить себя?</h2>
  <p>Попробуй мини-игру и узнай свой уровень!</p>

  <a href="game.html" class="btn game-btn">
    Играть и проверить себя 🚀
  </a>
</footer>

</body>
</html>
