<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#00ffcc">

<title>Deutsch Game</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  text-align: center;
  background: linear-gradient(135deg, #141e30, #243b55);
  color: white;
}

.container {
  padding: 15px;
  max-width: 500px;
  margin: auto;
}

button {
  padding: 15px;
  width: 90%;
  margin: 8px;
  border: none;
  border-radius: 15px;
  background: #00ffcc;
  font-size: 16px;
}

button:hover {
  background: #00ccaa;
  transform: scale(1.03);
}

.card {
  background: rgba(255,255,255,0.1);
  padding: 15px;
  border-radius: 15px;
  margin-top: 20px;
}

#topList {
  list-style: none;
  padding: 0;
}

#topList li {
  background: rgba(255,255,255,0.1);
  margin: 8px;
  padding: 10px;
  border-radius: 10px;
}
</style>
</head>

<body>

<div class="container">

<h1 id="title">🇩🇪 Deutsch Game</h1>

<a href="game.html">
  <button>🎮 Играть и проверить себя</button>
</a>

<div class="card">
  <h2>👤 Профиль</h2>
  <p id="profile">Гость</p>
</div>

<div class="card">
  <h2>🏆 Топ игроков</h2>
  <ul id="topList"></ul>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { 
  getFirestore, 
  collection, 
  getDocs, 
  query, 
  orderBy, 
  limit,
  doc,
  setDoc,
  onSnapshot
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

import { getAuth, GoogleAuthProvider, signInWithPopup }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

// 🔥 ТВОЙ FIREBASE
const firebaseConfig = {
  apiKey: "AIzaSyBNLGv37SNJ9B6Wg8L_tzvACs74FRWtlbQ",
  authDomain: "dsd-1-bd1d3.firebaseapp.com",
  projectId: "dsd-1-bd1d3",
  storageBucket: "dsd-1-bd1d3.firebasestorage.app",
  messagingSenderId: "767600115022",
  appId: "1:767600115022:web:dd617064aec2c7c687b21f"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

// =========================
// 👤 ИМЯ ПРИ ПЕРВОМ ВХОДЕ
// =========================

let name = localStorage.getItem("playerName");

if (!name) {
  name = prompt("Введите имя и фамилию:");
  if (name) {
    localStorage.setItem("playerName", name);

    // создаём игрока в базе
    await setDoc(doc(db, "leaderboard", name), {
      name: name,
      score: 0,
      xp: 0,
      level: "A1",
      coins: 0,
      games: 0,
      streak: 0,
      seasonScore: 0,
      banned: false
    });
  } else {
    name = "Гость";
  }
}

document.getElementById("profile").innerText = name;

// =========================
// 🏆 REAL-TIME ТОП
// =========================

function loadTopRealtime() {
  const q = query(
    collection(db, "leaderboard"),
    orderBy("score", "desc"),
    limit(5)
  );

  onSnapshot(q, (snapshot) => {
    let list = document.getElementById("topList");
    list.innerHTML = "";

    let i = 0;

    snapshot.forEach(doc => {
      let d = doc.data();
      i++;

      let medal = i === 1 ? "🥇" :
                   i === 2 ? "🥈" :
                   i === 3 ? "🥉" : "🎮";

      let li = document.createElement("li");
      li.innerText = `${medal} ${d.name} - ⭐ ${d.score}`;
      list.appendChild(li);
    });
  });
}

loadTopRealtime();

// =========================
// 🔐 СЕКРЕТ АДМИН ВХОД
// =========================

const ADMIN_EMAIL = "samirdv888@gmail.com";

let clicks = 0;
let code = "";

document.getElementById("title").addEventListener("click", () => {
  clicks++;
  if (clicks >= 5) unlock();
  setTimeout(() => clicks = 0, 2000);
});

document.addEventListener("keydown", e => {
  code += e.key.toLowerCase();

  if (code.includes("admin")) unlock();

  if (code.length > 10) code = "";
});

async function unlock() {
  showEffect("🔐 ACCESS CHECK...");

  const provider = new GoogleAuthProvider();
  const res = await signInWithPopup(auth, provider);

  if (res.user.email === ADMIN_EMAIL) {
    showEffect("✅ ACCESS GRANTED");
    setTimeout(() => {
      window.location.href = "admin.html";
    }, 1200);
  } else {
    showEffect("❌ ACCESS DENIED");
  }
}

// эффект
function showEffect(text) {
  let div = document.createElement("div");

  div.style.position = "fixed";
  div.style.top = "0";
  div.style.left = "0";
  div.style.width = "100%";
  div.style.height = "100%";
  div.style.background = "black";
  div.style.color = "#00ffcc";
  div.style.display = "flex";
  div.style.alignItems = "center";
  div.style.justifyContent = "center";
  div.style.fontSize = "28px";
  div.style.zIndex = "9999";
  div.innerText = text;

  document.body.appendChild(div);
  setTimeout(() => div.remove(), 1500);
}
</script>

<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js");
}
</script>

</body>
</html>
