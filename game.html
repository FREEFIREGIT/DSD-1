<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Deutsch Game PRO</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  text-align: center;
  background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
  color: white;
}

.container {
  padding: 15px;
  max-width: 500px;
  margin: auto;
}

h1 {
  font-size: 24px;
}

.card {
  background: rgba(255,255,255,0.1);
  padding: 20px;
  border-radius: 20px;
  margin-top: 20px;
  backdrop-filter: blur(10px);
}

button {
  width: 100%;
  padding: 15px;
  margin: 8px 0;
  border: none;
  border-radius: 15px;
  font-size: 16px;
  background: #00ffcc;
  cursor: pointer;
  transition: 0.2s;
}

button:hover {
  transform: scale(1.03);
  background: #00ccaa;
}

button:active {
  transform: scale(0.95);
}

#timer {
  color: #ffcc00;
  font-size: 18px;
}

#score {
  margin-top: 10px;
}

.select button {
  background: orange;
}
</style>
</head>

<body>

<div class="container">

<h1>🇩🇪 Deutsch Game PRO</h1>

<div class="select">
  <p>Выбери уровень:</p>
  <button onclick="startGame('easy')">Лёгкий</button>
  <button onclick="startGame('medium')">Средний</button>
  <button onclick="startGame('hard')">Сложный</button>
</div>

<div id="game" style="display:none;">
  <div class="card">
    <h2 id="question"></h2>

    <div id="answers"></div>

    <p id="result"></p>
    <p id="score">Очки: 0</p>
    <p id="timer">Время: 10</p>
  </div>
</div>

<h2>🏆 Топ игроков</h2>
<ul id="topList"></ul>

</div>

<script>
let questions = [];
let index = 0;
let score = 0;
let time = 10;
let timer;

// вопросы
const allQuestions = {
  easy: [
    {q:"вода", a:"Wasser", options:["Wasser","Brot","Milch"]},
    {q:"хлеб", a:"Brot", options:["Brot","Käse","Saft"]}
  ],
  medium: [
    {q:"яблоко", a:"Apfel", options:["Apfel","Banane","Traube"]},
    {q:"сыр", a:"Käse", options:["Käse","Milch","Butter"]}
  ],
  hard: [
    {q:"я иду в школу", a:"Ich gehe zur Schule", options:[
      "Ich gehe zur Schule",
      "Ich Schule gehe",
      "Gehe ich Schule"
    ]}
  ]
};

function startGame(level) {
  questions = allQuestions[level];
  index = 0;
  score = 0;

  document.querySelector(".select").style.display = "none";
  document.getElementById("game").style.display = "block";

  loadQuestion();
}

function loadQuestion() {
  if(index >= questions.length) {
    endGame();
    return;
  }

  document.getElementById("question").innerText = questions[index].q;

  let answersDiv = document.getElementById("answers");
  answersDiv.innerHTML = "";

  questions[index].options.forEach(opt => {
    let btn = document.createElement("button");
    btn.innerText = opt;
    btn.onclick = () => check(opt);
    answersDiv.appendChild(btn);
  });

  startTimer();
}

function startTimer() {
  time = 10;
  document.getElementById("timer").innerText = "Время: " + time;

  clearInterval(timer);

  timer = setInterval(() => {
    time--;
    document.getElementById("timer").innerText = "Время: " + time;

    if(time <= 0) {
      clearInterval(timer);
      index++;
      loadQuestion();
    }
  }, 1000);
}

function check(answer) {
  clearInterval(timer);

  if(answer === questions[index].a) {
    score++;
    document.getElementById("result").innerText = "Правильно 🎉";
  } else {
    document.getElementById("result").innerText = "Неправильно ❌";
  }

  index++;
  document.getElementById("score").innerText = "Очки: " + score;

  setTimeout(loadQuestion, 800);
}

// END GAME
function endGame() {
  document.getElementById("question").innerText = "Игра окончена!";
  document.getElementById("answers").innerHTML = "";
  document.getElementById("result").innerText = "Твой результат: " + score;

  let name = prompt("Введи имя:");

  if(name) {
    saveScore(name, score);
  }

  loadTop();
}
</script>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, query, orderBy, limit }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBNLGv37SNJ9B6Wg8L_tzvACs74FRWtlbQ",
  authDomain: "dsd-1-bd1d3.firebaseapp.com",
  projectId: "dsd-1-bd1d3",
  storageBucket: "dsd-1-bd1d3.firebasestorage.app",
  messagingSenderId: "767600115022",
  appId: "1:767600115022:web:dd617064aec2c7c687b21f"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// сохранить
window.saveScore = async function(name, score) {
  await addDoc(collection(db, "leaderboard"), {
    name: name,
    score: score
  });
};

// загрузить топ
window.loadTop = async function() {
  const q = query(collection(db, "leaderboard"), orderBy("score","desc"), limit(5));
  const snapshot = await getDocs(q);

  let list = document.getElementById("topList");
  list.innerHTML = "";

  snapshot.forEach(doc => {
    let p = doc.data();
    let li = document.createElement("li");
    li.innerText = p.name + " — " + p.score;
    list.appendChild(li);
  });
};

loadTop();
</script>

</body>
</html>
