<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Deutsch Game PRO</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  text-align: center;
  background: linear-gradient(135deg, #141e30, #243b55);
  color: white;
}

.container {
  padding: 30px;
}

h1 {
  font-size: 35px;
}

button {
  padding: 12px 20px;
  margin: 10px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  font-size: 16px;
  background: #00ffcc;
}

button:hover {
  background: #00ccaa;
}

.select {
  margin: 20px;
}

.card {
  background: rgba(255,255,255,0.1);
  padding: 20px;
  border-radius: 15px;
  display: inline-block;
  margin-top: 20px;
}

#timer {
  font-size: 20px;
  margin-top: 10px;
  color: #ffcc00;
}

#leaderboard {
  margin-top: 20px;
}
</style>

</head>

<body>

<div class="container">

<h1>🇩🇪 Deutsch Game PRO</h1>

<div class="select">
  <p>Выбери уровень:</p>
  <button onclick="startGame('easy')">Лёгкий</button>
  <button onclick="startGame('medium')">Средний</button>
  <button onclick="startGame('hard')">Сложный</button>
</div>

<div id="game" style="display:none;">
  <div class="card">
    <p id="question"></p>
    <div id="answers"></div>
    <p id="result"></p>
    <p id="score">Очки: 0</p>
    <p id="timer">Время: 10</p>
  </div>
</div>

<div id="leaderboard">
  <h2>🏆 Топ игроков</h2>
  <ul id="topList"></ul>
</div>

</div>

<script>
let questions = [];
let index = 0;
let score = 0;
let time = 10;
let timer;

const allQuestions = {
  easy: [
    {q:"вода", a:"Wasser", options:["Wasser","Brot","Milch"]},
    {q:"хлеб", a:"Brot", options:["Brot","Käse","Saft"]}
  ],
  medium: [
    {q:"яблоко", a:"Apfel", options:["Apfel","Banane","Traube"]},
    {q:"сыр", a:"Käse", options:["Milch","Käse","Butter"]}
  ],
  hard: [
    {q:"сегодня я иду в школу", a:"Ich gehe heute zur Schule", options:[
      "Ich gehe heute zur Schule",
      "Heute ich Schule gehe",
      "Ich heute gehe Schule"
    ]}
  ]
};

function startGame(level) {
  questions = allQuestions[level];
  index = 0;
  score = 0;
  document.querySelector(".select").style.display = "none";
  document.getElementById("game").style.display = "block";
  loadQuestion();
}

function loadQuestion() {
  if(index >= questions.length) {
    endGame();
    return;
  }

  document.getElementById("question").innerText = questions[index].q;
  let answersDiv = document.getElementById("answers");
  answersDiv.innerHTML = "";

  questions[index].options.forEach(opt => {
    let btn = document.createElement("button");
    btn.innerText = opt;
    btn.onclick = () => check(opt);
    answersDiv.appendChild(btn);
  });

  startTimer();
}

function startTimer() {
  time = 10;
  document.getElementById("timer").innerText = "Время: " + time;

  clearInterval(timer);
  timer = setInterval(() => {
    time--;
    document.getElementById("timer").innerText = "Время: " + time;

    if(time <= 0) {
      clearInterval(timer);
      index++;
      loadQuestion();
    }
  }, 1000);
}

function check(answer) {
  clearInterval(timer);

  if(answer === questions[index].a) {
    score++;
    document.getElementById("result").innerText = "Правильно 🎉";
  } else {
    document.getElementById("result").innerText = "Неправильно ❌";
  }

  index++;
  document.getElementById("score").innerText = "Очки: " + score;

  setTimeout(loadQuestion, 800);
}

function endGame() {
  document.getElementById("question").innerText = "Игра окончена!";
  document.getElementById("answers").innerHTML = "";
  document.getElementById("result").innerText = "Твой результат: " + score;

  let name = prompt("Введи имя:");
  if(name) {
    let top = JSON.parse(localStorage.getItem("top")) || [];
    top.push({name, score});
    top.sort((a,b) => b.score - a.score);
    localStorage.setItem("top", JSON.stringify(top.slice(0,5)));
  }

  showTop();
}

function showTop() {
  let top = JSON.parse(localStorage.getItem("top")) || [];
  let list = document.getElementById("topList");
  list.innerHTML = "";

  top.forEach(player => {
    let li = document.createElement("li");
    li.innerText = player.name + " — " + player.score;
    list.appendChild(li);
  });
}

showTop();
</script>

</body>
</html>
