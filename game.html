<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Game PRO</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  text-align: center;
  background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
  color: white;
}

.container {
  max-width: 500px;
  margin: auto;
  padding: 15px;
}

button {
  width: 100%;
  padding: 15px;
  margin: 8px 0;
  border-radius: 15px;
  border: none;
  background: #00ffcc;
}

button:hover {
  transform: scale(1.03);
}

.card {
  background: rgba(255,255,255,0.1);
  padding: 20px;
  border-radius: 20px;
}

#timer {
  color: #ffcc00;
}
</style>
</head>

<body>

<div class="container">

<h1>🇩🇪 Game PRO</h1>

<div class="card">
  <h2 id="question"></h2>
  <div id="answers"></div>

  <p id="result"></p>
  <p id="score">0</p>
  <p id="timer">10</p>
</div>

</div>

<script>
let questions = [
  {q:"вода", a:"Wasser", options:["Wasser","Brot","Milch"]},
  {q:"хлеб", a:"Brot", options:["Brot","Käse","Saft"]},
  {q:"яблоко", a:"Apfel", options:["Apfel","Banane","Traube"]}
];

let i = 0;
let score = 0;
let time = 10;
let timer;

function loadQ() {
  if(i >= questions.length) return end();

  document.getElementById("question").innerText = questions[i].q;

  let box = document.getElementById("answers");
  box.innerHTML = "";

  questions[i].options.forEach(o => {
    let b = document.createElement("button");
    b.innerText = o;
    b.onclick = () => check(o);
    box.appendChild(b);
  });

  startTimer();
}

function startTimer() {
  time = 10;
  clearInterval(timer);

  timer = setInterval(() => {
    time--;
    document.getElementById("timer").innerText = time;

    if(time <= 0) {
      i++;
      loadQ();
    }
  },1000);
}

function check(a) {
  clearInterval(timer);

  if(a === questions[i].a) score++;

  document.getElementById("score").innerText = score;

  i++;
  setTimeout(loadQ,500);
}

function end() {
  document.getElementById("question").innerText = "Игра окончена!";
  document.getElementById("answers").innerHTML = "";

  let name = prompt("Имя:");

  if(name) {
    localStorage.setItem("playerName", name);
    saveScore(name, score);
  }
}
</script>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  projectId: "YOUR_PROJECT_ID",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.saveScore = async function(name, score) {
  await addDoc(collection(db,"leaderboard"), {
    name, score
  });
};
</script>

<script>
loadQ();
</script>

</body>
</html>
